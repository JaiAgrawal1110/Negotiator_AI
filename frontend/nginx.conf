server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Single-page app: any path that isn't a real static file falls back
    # to index.html so client-side state isn't broken by a hard refresh.
    # Not strictly needed today (this app has no client-side router yet),
    # but harmless now and saves a debugging session the day one gets added.
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/css application/javascript application/json;
}
